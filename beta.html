<!DOCTYPE html>
<html lang='en' class='dark'>
<head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1.0'><title>WareTools Beta Part 1</title></head><body>
<!-- WareTools Beta Part 1 -->
<h1>WareTools Beta Part 1</h1>
<p>Starter chunk for beta build.</p>
<!-- CONTINUES IN PART 2 -->

<div class="bg-white dark:bg-slate-800 rounded-3xl shadow-xl p-4 mt-6 overflow-x-auto">

<table class="min-w-full">

<thead>
<tr class="border-b border-slate-300 dark:border-slate-700">
<th class="p-3 text-left">LOCATION</th>
<th class="p-3 text-left">SKU</th>
<th class="p-3 text-left">QTY</th>
<th class="p-3 text-left">BOX</th>
<th class="p-3 text-left">ACTION</th>
</tr>
</thead>

<tbody id="tableBody"></tbody>

</table>

</div>

<div class="text-center text-sm text-slate-500 mt-6">
WareTools Beta v2.0.0 • Autosaved • GitHub Pages Ready
</div>

</div>

<script>

const STORAGE_KEY="waretools_beta_stock";
let rows=[];

const locationInput=document.getElementById("location");
const skuInput=document.getElementById("sku");
const qtyInput=document.getElementById("qty");
const boxInput=document.getElementById("box");

function saveData(){
localStorage.setItem(STORAGE_KEY,JSON.stringify(rows));
}

function loadData(){
const data=localStorage.getItem(STORAGE_KEY);
if(data){
rows=JSON.parse(data);
}
renderTable();
}

function updateDashboard(){

document.getElementById("entryCount").textContent=rows.length;

document.getElementById("qtyCount").textContent=
rows.reduce((a,b)=>a+(parseFloat(b.qty)||0),0);

document.getElementById("skuCount").textContent=
new Set(rows.map(r=>r.sku)).size;

document.getElementById("locationCount").textContent=
new Set(rows.map(r=>r.location)).size;

}

// CONTINUES IN PART 3

function renderTable(){

const tbody=document.getElementById("tableBody");
const search=document.getElementById("search").value.toLowerCase();

tbody.innerHTML="";

rows.forEach((r,index)=>{

const rowText=
`${r.location} ${r.sku} ${r.qty} ${r.box}`.toLowerCase();

if(search && !rowText.includes(search)){
return;
}

const tr=document.createElement("tr");

tr.className="border-b border-slate-200 dark:border-slate-700";

tr.innerHTML=`
<td class="p-3">${r.location}</td>
<td class="p-3">${r.sku}</td>
<td class="p-3">${r.qty}</td>
<td class="p-3">${r.box || ""}</td>
<td class="p-3 flex gap-2 flex-wrap">

<button
onclick="editRow(${index})"
class="bg-yellow-500 text-black px-3 py-2 rounded-xl font-bold">
Edit
</button>

<button
onclick="duplicateRow(${index})"
class="bg-blue-600 px-3 py-2 rounded-xl font-bold">
Copy
</button>

<button
onclick="deleteRow(${index})"
class="bg-red-600 px-3 py-2 rounded-xl font-bold">
Delete
</button>

</td>
`;

tbody.appendChild(tr);

});

updateDashboard();
saveData();

}

function addRow(){

const location=locationInput.value.trim();
const sku=skuInput.value.trim();
const qty=qtyInput.value.trim();
const box=boxInput.value.trim();

if(!location || !sku || !qty){
alert("Location, SKU and Quantity are required.");
return;
}

rows.push({
location,
sku,
qty,
box
});

renderTable();

locationInput.value="";
skuInput.value="";
qtyInput.value="";
boxInput.value="";

locationInput.focus();

}

// CONTINUES IN PART 4

function deleteRow(index){

if(!confirm("Delete this row?")){
return;
}

rows.splice(index,1);
renderTable();

}

function editRow(index){

const row=rows[index];

locationInput.value=row.location;
skuInput.value=row.sku;
qtyInput.value=row.qty;
boxInput.value=row.box;

rows.splice(index,1);

renderTable();

locationInput.focus();

}

function duplicateRow(index){

const row={...rows[index]};

row.box="";

rows.push(row);

renderTable();

}

function undoLast(){

if(rows.length===0){
return;
}

rows.pop();

renderTable();

}

function clearAll(){

if(!confirm("Clear all stock take data?")){
return;
}

rows=[];

renderTable();

}

function downloadCSV(){

let csv="LOCATION,SKU,QUANTITY,BOX NO\n";

rows.forEach(r=>{
csv+=`${r.location},${r.sku},${r.qty},${r.box}\n`;
});

const blob=new Blob([csv],{type:"text/csv"});
const url=URL.createObjectURL(blob);

const a=document.createElement("a");

const d=new Date();

a.download=`stocktake_${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}.csv`;

a.href=url;
a.click();

URL.revokeObjectURL(url);

}

// CONTINUES IN PART 5
function importCSV(text){

rows=[];

const lines=text.split("\n");

lines.slice(1).forEach(line=>{

if(!line.trim()) return;

const cols=line.split(",");

rows.push({
location:cols[0] || "",
sku:cols[1] || "",
qty:cols[2] || "",
box:cols[3] || ""
});

});

renderTable();

}

document.getElementById("csvFile")
.addEventListener("change",e=>{

const file=e.target.files[0];

if(!file) return;

const reader=new FileReader();

reader.onload=evt=>{
importCSV(evt.target.result);
};

reader.readAsText(file);

});

document.getElementById("importBtn")
.addEventListener("click",()=>{
document.getElementById("csvFile").click();
});

document.getElementById("addBtn").addEventListener("click",addRow);
document.getElementById("undoBtn").addEventListener("click",undoLast);
document.getElementById("clearBtn").addEventListener("click",clearAll);
document.getElementById("csvBtn").addEventListener("click",downloadCSV);
document.getElementById("search").addEventListener("input",renderTable);

document.getElementById("duplicateBtn")
.addEventListener("click",()=>{
if(rows.length===0) return;
duplicateRow(rows.length-1);
});

locationInput.addEventListener("keydown",e=>{
if(e.key==="Enter") skuInput.focus();
});

skuInput.addEventListener("keydown",e=>{
if(e.key==="Enter") qtyInput.focus();
});

qtyInput.addEventListener("keydown",e=>{
if(e.key==="Enter") boxInput.focus();
});

boxInput.addEventListener("keydown",e=>{
if(e.key==="Enter") addRow();
});

loadData();
locationInput.focus();

</script>
</body>
</html>
