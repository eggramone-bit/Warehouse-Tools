<!DOCTYPE html>
<html lang="en" class="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stock Take</title>

<script src="https://cdn.tailwindcss.com"></script>

<script>
tailwind.config = {
    darkMode: 'class'
}
</script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;600;800&display=swap" rel="stylesheet">



<style>

body{
    font-family:'Barlow',sans-serif;
    -webkit-tap-highlight-color: transparent;
}

input{
    font-size:18px;
}

button{
    touch-action: manipulation;
}

h1{
    font-weight:800;
    letter-spacing:-0.03em;
}

</style>


</head>

<body class="bg-gray-100 dark:bg-gray-900 text-gray-900 dark:text-white min-h-screen">

<div class="max-w-5xl mx-auto p-4 space-y-6">

    <div class="bg-white dark:bg-gray-800 rounded-3xl shadow-xl p-6">
        <h1 class="text-4xl font-bold text-center mb-6">
            /Stock Take
        </h1>

        <div class="grid gap-4">

            <input id="location"
                class="w-full rounded-2xl p-4 text-xl bg-gray-100 dark:bg-gray-700 outline-none focus:ring-4 focus:ring-blue-500"
                placeholder="Location">

            <input id="sku"
                class="w-full rounded-2xl p-4 text-xl bg-gray-100 dark:bg-gray-700 outline-none focus:ring-4 focus:ring-blue-500"
                placeholder="SKU">

            <input id="qty"
                type="number"
                class="w-full rounded-2xl p-4 text-xl bg-gray-100 dark:bg-gray-700 outline-none focus:ring-4 focus:ring-blue-500"
                placeholder="Quantity">

            <input id="box"
                class="w-full rounded-2xl p-4 text-xl bg-gray-100 dark:bg-gray-700 outline-none focus:ring-4 focus:ring-blue-500"
                placeholder="Box No (optional)">

        </div>

        <input type="file" id="csvImport" accept=".csv" hidden>
        <div class="grid grid-cols-2 gap-3 mt-6">

            <button id="addBtn"
                class="bg-green-600 hover:bg-green-700 active:scale-95 transition rounded-2xl p-5 text-xl font-bold">
                Add Row
            </button>

            <button id="undoBtn"
                class="bg-yellow-500 hover:bg-yellow-600 active:scale-95 transition rounded-2xl p-5 text-xl font-bold text-black">
                Undo Last
            </button>

            <button id="clearBtn"
                class="bg-red-600 hover:bg-red-700 active:scale-95 transition rounded-2xl p-5 text-xl font-bold">
                Clear All
            </button>

            <button id="importBtn"
    class="bg-indigo-600 hover:bg-indigo-700 active:scale-95 transition rounded-2xl p-5 text-xl font-bold">
    Import CSV
</button>

            <button id="csvBtn"
                class="bg-blue-600 hover:bg-blue-700 active:scale-95 transition rounded-2xl p-5 text-xl font-bold">
                Download CSV
            </button>

        </div>
    </div>

    <div class="bg-white dark:bg-gray-800 rounded-3xl shadow-xl p-4 overflow-x-auto">

        <div class="mb-3 text-lg font-bold">
    Total Entries: <span id="entryCount">0</span>
</div>

        <table class="min-w-full">

            <thead>
                <tr class="text-left text-lg border-b border-gray-400 dark:border-gray-600">
                    <th class="p-3">LOCATION</th>
                    <th class="p-3">SKU</th>
                    <th class="p-3">QUANTITY</th>
                    <th class="p-3">BOX NO</th>
                    <th class="p-3"></th>
                </tr>
            </thead>

            <tbody id="tableBody">
            </tbody>

        </table>

    </div>

</div>

<script>

const STORAGE_KEY="warehouse_stocktake_rows";

let rows=[];
let editingIndex=-1;

const locationInput=document.getElementById("location");
const skuInput=document.getElementById("sku");
const qtyInput=document.getElementById("qty");
const boxInput=document.getElementById("box");

function saveData(){
    localStorage.setItem(STORAGE_KEY,JSON.stringify(rows));
}

function loadData(){

    const data=localStorage.getItem(STORAGE_KEY);

    if(data){
        rows=JSON.parse(data);
    }

    renderTable();

}

function renderTable(){

    const tbody=document.getElementById("tableBody");
    tbody.innerHTML="";
    document.getElementById("entryCount").textContent=rows.length;

    rows.forEach((r,index)=>{

        const tr=document.createElement("tr");

        tr.className="border-b border-gray-200 dark:border-gray-700";

        tr.innerHTML=`
            <td class="p-3 text-lg">${escapeHtml(r.location)}</td>
            <td class="p-3 text-lg">${escapeHtml(r.sku)}</td>
            <td class="p-3 text-lg">${escapeHtml(r.qty)}</td>
            <td class="p-3 text-lg">${escapeHtml(r.box)}</td>
            <td class="p-3 flex gap-2">

    <button
        onclick="editRow(${index})"
        class="bg-blue-600 hover:bg-blue-700 rounded-xl px-4 py-2 font-bold">
        Edit
    </button>

    <button
        onclick="deleteRow(${index})"
        class="bg-red-600 hover:bg-red-700 rounded-xl px-4 py-2 font-bold">
        Delete
    </button>

</td>
        `;

        tbody.appendChild(tr);

    });

    saveData();

}

function escapeHtml(text){

    return String(text)
        .replace(/&/g,"&amp;")
        .replace(/</g,"&lt;")
        .replace(/>/g,"&gt;")
        .replace(/"/g,"&quot;");

}

function addRow(){

    const location=locationInput.value.trim();
    const sku=skuInput.value.trim();
    const qty=qtyInput.value.trim();
    const box=boxInput.value.trim();

    if(location===""||sku===""||qty===""){
        alert("Please complete Location, SKU and Quantity.");
        return;
    }

if(editingIndex>-1){

    rows[editingIndex]={
        location,
        sku,
        qty,
        box
    };

    editingIndex=-1;

    document.getElementById("addBtn").textContent="Add Row";

}else{

    rows.push({
        location,
        sku,
        qty,
        box
    });

}

    renderTable();

    locationInput.value="";
    skuInput.value="";
    qtyInput.value="";
    boxInput.value="";

    locationInput.focus();

}

function editRow(index){

    const row=rows[index];

    locationInput.value=row.location;
    skuInput.value=row.sku;
    qtyInput.value=row.qty;
    boxInput.value=row.box;

    editingIndex=index;

    document.getElementById("addBtn").textContent="Save Changes";

    locationInput.focus();

}


function deleteRow(index){

    rows.splice(index,1);
    renderTable();

}

function undoLast(){

    if(rows.length===0) return;

    rows.pop();

    renderTable();

}

function clearAll(){

    if(confirm("Clear all stock take data?")){

        rows=[];

        renderTable();

    }

}

function importCSV(file){

    const reader=new FileReader();

    reader.onload=function(event){

        const text=event.target.result;

        const lines=text.trim().split(/\r?\n/);

        rows=[];

        lines.slice(1).forEach(line=>{

            const cols=line.split(",");

            rows.push({
                location: cols[0] || "",
                sku: cols[1] || "",
                qty: cols[2] || "",
                box: cols[3] || ""
            });

        });

        renderTable();

    };

    reader.readAsText(file);

}

function downloadCSV(){

    let csv="LOCATION,SKU,QUANTITY,BOX NO\n";

    rows.forEach(r=>{

        csv+=`${r.location},${r.sku},${r.qty},${r.box}\n`;

    });

    const blob=new Blob([csv],{type:"text/csv"});

    const url=URL.createObjectURL(blob);

    const a=document.createElement("a");

    const d=new Date();

    const filename=
`stocktake_${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}_${String(d.getHours()).padStart(2,'0')}-${String(d.getMinutes()).padStart(2,'0')}-${String(d.getSeconds()).padStart(2,'0')}.csv`;
    a.href=url;

    a.download=filename;

    a.click();

    URL.revokeObjectURL(url);

}

document.getElementById("addBtn").addEventListener("click",addRow);
document.getElementById("undoBtn").addEventListener("click",undoLast);
document.getElementById("clearBtn").addEventListener("click",clearAll);
document.getElementById("csvBtn").addEventListener("click",downloadCSV);

document.getElementById("importBtn").addEventListener("click",()=>{

    document.getElementById("csvImport").click();

});

document.getElementById("csvImport").addEventListener("change",e=>{

    const file=e.target.files[0];

    if(!file) return;

    if(confirm("Replace current stock take with imported CSV?")){

        importCSV(file);

    }

});

locationInput.addEventListener("keydown",e=>{
    if(e.key==="Enter") skuInput.focus();
});

skuInput.addEventListener("keydown",e=>{
    if(e.key==="Enter") qtyInput.focus();
});

qtyInput.addEventListener("keydown",e=>{
    if(e.key==="Enter") boxInput.focus();
});

boxInput.addEventListener("keydown",e=>{
    if(e.key==="Enter") addRow();
});

loadData();

locationInput.focus();

</script>

</body>
</html>
